general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # Lock before the system goes to sleep.
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn display on after waking up.
}

listener {
    timeout = 150                                # 2.5 mins
    on-timeout = brightnessctl -s set 10         # Dim monitor backlight.
    on-resume = brightnessctl -r                 # Restore monitor backlight.
}

listener {
    timeout = 300                                 # 5 mins
    on-timeout = loginctl lock-session            # Trigger the lock screen.
}

listener {
    timeout = 330                                 # 5.5 mins
    on-timeout = hyprctl dispatch dpms off        # Turn off the screen.
    on-resume = hyprctl dispatch dpms on          # Turn screen back on.
}
